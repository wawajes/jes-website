<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jes's Room</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#1a1a2e;--warm:#FFD580;--coral:#FF7B7B;--teal:#7BFFDB;--violet:#B07BFF;--blue:#7BB3FF;--pink:#FF7BB8;--amber:#FFB347;--text:#f0ece4;--text-soft:#9a97ad;--panel-bg:rgba(20,20,40,0.95)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  .header{text-align:center;padding:2rem 1rem 0.3rem;z-index:10}
  .header h1{font-family:'Silkscreen',cursive;font-size:clamp(1.2rem,3.5vw,1.8rem);color:var(--warm);text-shadow:0 0 20px rgba(255,213,128,0.3)}
  .hint{font-family:'Silkscreen',cursive;font-size:0.55rem;color:var(--text-soft);margin-top:0.5rem;animation:pulse 3s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
  .scene{flex:1;display:flex;align-items:center;justify-content:center;width:100%;padding:0.5rem 1rem 1rem}
  .room{position:relative;width:720px;height:540px}
  .room-svg{width:100%;height:100%}
  [data-click]{cursor:pointer;transition:filter 0.25s}
  [data-click]:hover{filter:brightness(1.25) drop-shadow(0 0 8px rgba(255,213,128,0.4))}
  .tooltip{position:absolute;font-family:'Silkscreen',cursive;font-size:10px;padding:4px 10px;border-radius:5px;pointer-events:none;opacity:0;transition:opacity 0.25s;white-space:nowrap;z-index:50;transform:translate(-50%,-100%)}
  .tooltip.show{opacity:1}
  .panel-overlay{position:fixed;inset:0;background:rgba(10,10,25,0.75);backdrop-filter:blur(10px);z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.3s;display:flex;align-items:center;justify-content:center}
  .panel-overlay.active{opacity:1;pointer-events:all}
  .panel{background:var(--panel-bg);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:2.5rem;max-width:440px;width:90%;transform:translateY(16px) scale(0.96);transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);position:relative}
  .panel-overlay.active .panel{transform:translateY(0) scale(1)}
  .panel-close{position:absolute;top:1rem;right:1rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:var(--text-soft);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center}
  .panel-close:hover{background:rgba(255,255,255,0.1);color:var(--text)}
  .panel-icon{font-size:2.2rem;margin-bottom:0.75rem}.panel-title{font-family:'Silkscreen',cursive;font-size:1.25rem;margin-bottom:0.5rem}
  .panel-desc{font-size:0.92rem;line-height:1.7;color:var(--text-soft);margin-bottom:1.5rem}
  .panel-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.5rem}
  .panel-tag{font-size:0.72rem;font-weight:600;padding:0.25rem 0.7rem;border-radius:100px;border:1px solid rgba(255,255,255,0.1);color:var(--text-soft)}
  .panel-link{display:inline-flex;align-items:center;gap:0.4rem;font-weight:600;font-size:0.88rem;text-decoration:none;padding:0.6rem 1.2rem;border-radius:10px;transition:all 0.2s}
  .panel-link:hover{transform:translateX(4px)}
  .panel[data-color="teal"] .panel-title{color:var(--teal)}.panel[data-color="teal"] .panel-link{background:rgba(123,255,219,0.1);color:var(--teal)}
  .panel[data-color="coral"] .panel-title{color:var(--coral)}.panel[data-color="coral"] .panel-link{background:rgba(255,123,123,0.1);color:var(--coral)}
  .panel[data-color="violet"] .panel-title{color:var(--violet)}.panel[data-color="violet"] .panel-link{background:rgba(176,123,255,0.1);color:var(--violet)}
  .panel[data-color="amber"] .panel-title{color:var(--amber)}.panel[data-color="amber"] .panel-link{background:rgba(255,179,71,0.1);color:var(--amber)}
  .panel[data-color="blue"] .panel-title{color:var(--blue)}.panel[data-color="blue"] .panel-link{background:rgba(123,179,255,0.1);color:var(--blue)}
  .footer{text-align:center;padding:1.2rem;z-index:10}
  .social-row{display:flex;justify-content:center;gap:0.6rem;margin-bottom:0.5rem;flex-wrap:wrap}
  .social-btn{font-family:'Silkscreen',cursive;font-size:0.6rem;padding:0.35rem 0.8rem;border-radius:6px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:var(--text-soft);text-decoration:none;transition:all 0.2s}
  .social-btn:hover{background:rgba(255,255,255,0.1);color:var(--warm);border-color:rgba(255,213,128,0.2)}
  .footer-copy{font-size:0.65rem;color:rgba(255,255,255,0.2)}
  .particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .particle{position:absolute;background:rgba(255,213,128,0.2);border-radius:50%;animation:floatUp linear infinite}
  @keyframes floatUp{0%{transform:translateY(100vh);opacity:0}10%{opacity:1}90%{opacity:0.6}100%{transform:translateY(-10vh);opacity:0}}
  @keyframes plantWiggle{0%{transform:rotate(0)}25%{transform:rotate(-10deg)}50%{transform:rotate(8deg)}75%{transform:rotate(-5deg)}100%{transform:rotate(0)}}
  @media(max-width:750px){.room{transform:scale(0.6);transform-origin:top center}}
  @media(max-width:480px){.room{transform:scale(0.45);transform-origin:top center}}
</style>
</head>

<script>
// ===== ALL DATA =====
var projects = {
  mumble_note: { icon:'\u{1F4D3}', title:'Mumble Note', color:'teal', desc:'Voice-first note-taking that captures your thoughts naturally. Speak your mind, get structured notes.', tags:['Voice AI','Productivity','Notes'], link:'https://www.mumblenote.com' },
  mumble_ai: { icon:'\u{1F916}', title:'Mumble AI', color:'blue', desc:'AI-powered voice intelligence platform. Meeting notes, voice notes, dictation, 3-in-one.', tags:['AI','Voice','Dictation','Skills'], link:'https://www.heymumble.com' },
  calendar: { icon:'\u{1F4C5}', title:'Calendar AI', color:'violet', desc:'A Chrome extension that brings AI-powered intelligence to your Google Calendar.', tags:['Chrome Extension','AI','Productivity'], link:'https://www.jeswan.ai/calendar-ai' },
  substack: { icon:'\u270D\uFE0F', title:'Jes\u2019s Substack', color:'coral', desc:'Writing about building products, learning, and growing in the AI era.', tags:['Writing','Newsletter','Indie Maker'], link:'https://jeswan.substack.com/' },
  brew: { icon:'\u{1F37A}', title:'Brew Your Thoughts', color:'amber', desc:'Speak or type your thoughts, get a digital journal page with source card and ASCII images that you can drag around.', tags:['Journal','Creative','AI'], link:'https://www.jeswan.ai/brew' }
};

// ===== PANEL =====
function showPanel(key) {
  var p = projects[key];
  if (!p) return;
  document.getElementById('panelIcon').textContent = p.icon;
  document.getElementById('panelTitle').textContent = p.title;
  document.getElementById('panelDesc').textContent = p.desc;
  document.getElementById('panelLink').href = p.link;
  document.getElementById('panel').setAttribute('data-color', p.color);
  document.getElementById('panelTags').innerHTML = p.tags.map(function(t){ return '<span class="panel-tag">'+t+'</span>'; }).join('');
  document.getElementById('overlay').classList.add('active');
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('active');
});
document.getElementById('panelCloseBtn').addEventListener('click', function() {
  document.getElementById('overlay').classList.remove('active');
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('overlay').classList.remove('active');
});

// ===== TOOLTIP =====
var tip = document.getElementById('tooltip');
function showTip(el, text, color) {
  tip.textContent = text;
  tip.style.background = 'var(--' + color + ')';
  tip.style.color = (color === 'amber' || color === 'teal') ? 'var(--bg)' : '#fff';
  var b = el.getBoundingClientRect();
  var r = document.querySelector('.room').getBoundingClientRect();
  tip.style.left = (b.left + b.width/2 - r.left) + 'px';
  tip.style.top = (b.top - r.top - 8) + 'px';
  tip.classList.add('show');
}
function hideTip() { tip.classList.remove('show'); }

// ===== BIND ALL [data-click] elements via JS (no inline handlers!) =====
document.querySelectorAll('[data-click]').forEach(function(el) {
  el.addEventListener('click', function(e) {
    e.stopPropagation();
    showPanel(this.getAttribute('data-click'));
  });
  el.addEventListener('mouseenter', function() {
    var tipText = this.getAttribute('data-tip');
    var tipColor = this.getAttribute('data-tip-color');
    if (tipText) showTip(this, tipText, tipColor);
  });
  el.addEventListener('mouseleave', hideTip);
});

  e.preventDefault();

  document.getElementById('catEyesOpen').style.display = catSleeping ? 'none' : '';
  document.getElementById('catEyesClosed').style.display = catSleeping ? '' : 'none';

// ===== CALENDAR =====
(function() {
  var now = new Date();
  document.getElementById('calMonth').textContent = now.toLocaleString('en',{month:'short'}).toUpperCase() + ' ' + now.getFullYear();
  var grid = document.getElementById('calGrid');
  var firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
  var daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  var today = now.getDate();
  var baseX=535, baseY=198, colDx=8, colDy=4, rowDy=8, day=1;
  for (var row=0; row<6 && day<=daysInMonth; row++) {
    for (var col=0; col<7; col++) {
      if (row===0 && col<firstDay) continue;
      if (day>daysInMonth) break;
      var c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx', baseX + col*colDx);
      c.setAttribute('cy', baseY + col*colDy + row*rowDy);
      c.setAttribute('r', day===today ? '2.5' : '1.8');
      c.setAttribute('fill', day===today ? '#B07BFF' : '#ccc');
      if (day===today) { c.setAttribute('stroke','rgba(176,123,255,0.4)'); c.setAttribute('stroke-width','2'); }
      grid.appendChild(c);
      day++;
    }
  }
})();
